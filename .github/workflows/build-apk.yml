name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'

      - name: Create Flutter project
        run: |
          flutter create --org com.deepfocus --project-name deep_focus_pro tmp_project
          rm -rf android
          cp -r tmp_project/android .
          rm -rf tmp_project

      - name: Add AndroidManifest
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:tools="http://schemas.android.com/tools">
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <uses-permission android:name="android.permission.VIBRATE"/>
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>
              <uses-permission android:name="android.permission.PACKAGE_USAGE_STATS" tools:ignore="ProtectedPermissions"/>
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.USE_BIOMETRIC"/>
              <application
                  android:label="Deep Focus Pro"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data android:name="io.flutter.embedding.android.NormalTheme" android:resource="@style/NormalTheme"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <service
                      android:name=".AppBlockerService"
                      android:exported="true"
                      android:label="Deep Focus Blocker"
                      android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE">
                      <intent-filter>
                          <action android:name="android.accessibilityservice.AccessibilityService"/>
                      </intent-filter>
                      <meta-data android:name="android.accessibilityservice" android:resource="@xml/accessibility_service_config"/>
                  </service>
                  <receiver android:name=".BootReceiver" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.BOOT_COMPLETED"/>
                      </intent-filter>
                  </receiver>
                  <meta-data android:name="flutterEmbedding" android:value="2"/>
              </application>
          </manifest>
          EOF

      - name: Add Accessibility Config
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/accessibility_service_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <accessibility-service
              xmlns:android="http://schemas.android.com/apk/res/android"
              android:accessibilityEventTypes="typeWindowStateChanged|typeWindowContentChanged"
              android:accessibilityFeedbackType="feedbackGeneric"
              android:accessibilityFlags="flagDefault"
              android:canRetrieveWindowContent="true"
              android:notificationTimeout="100"/>
          EOF

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: DeepFocusPro-APK
          path: build/app/outputs/flutter-apk/app-release.apk
