name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Create Flutter project
        run: |
          flutter create --org com.deepfocus --project-name deep_focus_pro tmp_project
          cp -r tmp_project/android .
          rm -rf tmp_project

      - name: Fix compileSdkVersion
        run: |
          sed -i 's/compileSdkVersion 34/compileSdkVersion 35/g' android/app/build.gradle
          sed -i 's/targetSdkVersion 34/targetSdkVersion 35/g' android/app/build.gradle

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: DeepFocusPro-APK
          path: build/app/outputs/flutter-apk/app-release.apk
